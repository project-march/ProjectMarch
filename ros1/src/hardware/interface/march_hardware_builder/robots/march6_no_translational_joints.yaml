march6:
  if_name: enp0s31f6
  ecatCycleTime: 4
  ecatSlaveTimeout: 250
  joints:
    - left_hip_fe:
        allowActuation: true
        motor_controller:
          actuationMode: torque
          type: odrive 
          slaveIndex: 2
          axis: 0
          motorKV: 95
          absoluteEncoder:
            resolution: 20
            minPositionIU:
            maxPositionIU:
          incrementalEncoder:
            resolution: 12
            transmission: 121

    - left_knee:
        allowActuation: true
        motor_controller:
          actuationMode: torque
          type: odrive 
          slaveIndex: 1
          axis: 1
          motorKV: 95
          absoluteEncoder:
            resolution: 20
            minPositionIU:
            maxPositionIU:
          incrementalEncoder:
            resolution: 12
            transmission: 121
            
    - right_hip_fe:
        allowActuation: true
        motor_controller:
          actuationMode: torque
          type: odrive 
          slaveIndex: 3
          axis: 0
          motorKV: 95
          absoluteEncoder:
            resolution: 20
            minPositionIU:
            maxPositionIU:
          incrementalEncoder:
            resolution: 12
            transmission: 121

    - right_knee:
        allowActuation: true
        motor_controller:
          actuationMode: torque
          type: odrive 
          slaveIndex: 4
          axis: 1
          motorKV: 95
          absoluteEncoder:
            resolution: 20
            minPositionIU:
            maxPositionIU:
          incrementalEncoder:
            resolution: 12
            transmission: 121