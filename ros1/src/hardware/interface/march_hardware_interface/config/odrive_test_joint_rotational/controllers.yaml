march:
  controller:
    joint_state:
      type: joint_state_controller/JointStateController
      publish_rate: 50
    temperature_sensor:
      type: march_temperature_sensor_controller/MarchTemperatureSensorController
      publish_rate: 50
    pdb_state:
      type: march_pdb_state_controller/MarchPdbStateController
      publish_rate: 50
    trajectory:
      type: inertia_trajectory_controller/JointTrajectoryController
      joints:
        - rotational_joint
      constraints:
        rotational_joint:
          margin_soft_limit_error: 0.5
          trajectory: 01 #0.305
          goal: 01 #0.305
      gains: # Required because we're controlling an effort interface
        rotational_joint: {p: 130.0, i: 10.0, d: 0.0, i_clamp: 100.0, publish_state: true, antiwindup: true}