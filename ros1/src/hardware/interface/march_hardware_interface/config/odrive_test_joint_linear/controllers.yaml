march:
  controller:
    joint_state:
      type: joint_state_controller/JointStateController
      publish_rate: 50
    temperature_sensor:
      type: march_temperature_sensor_controller/MarchTemperatureSensorController
      publish_rate: 50
    pdb_state:
      type: march_pdb_state_controller/MarchPdbStateController
      publish_rate: 50
    trajectory:
#      type: effort_controllers/JointTrajectoryController
#      # When you switch to effort actuation-mode, 'position_controllers' must be substituted with 'effort_controllers' and the gains must be added
      type: model_predictive_trajectory_controller/JointTrajectoryController
      N: 10
      joints:
        - linear_joint

#      gains: # Required because we're controlling an effort interface
#        linear_joint: {p: 120, i: 0, d: -5, i_clamp: 10, publish_state: true, antiwindup: true}
#      # Note: these gains are tuned for the KFE joints in the exoskeleton

      # Controller tuning parameters
      # Q and R are the weights on the states and inputs of the system respectively
      # The parameters represent the values on the diagonal of the MPC weighting matrix
      # Both parameters are required for each joint
      weights:
        linear_joint:
          Q: [ 100.0, 1.0 ]
          R: [ 0.01 ]


      constraints:
        linear_joint:
          margin_soft_limit_error: 0.5
          trajectory: 0.305
          goal: 0.305
